<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HubJupyLab{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/vendor/htmx.min.js" defer></script>
    <script src="/static/vendor/alpine.min.js" defer></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <div class="logo-container">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="20" height="20" rx="4" fill="#6366F1" fill-opacity="0.2" stroke="#6366F1" stroke-width="2"/>
                <circle cx="8" cy="12" r="2" fill="#34D399"/>
                <circle cx="16" cy="12" r="2" fill="#818CF8"/>
            </svg>
            <h1>HubJupyLab</h1>
        </div>
        {% if user %}
        <div class="nav-user">
            {% if user.role == 'admin' %}
            <button onclick="openCreateUserModal()" class="btn btn-primary btn-sm" style="margin-right: 0.5rem;">＋ Create User</button>
            {% endif %}
            <span>Logged in as: <strong>{{ user.username }}</strong> ({{ user.role }})</span>
            <a href="/logout" class="btn btn-outline btn-sm">Logout</a>
        </div>
        {% endif %}
    </header>

    <main>
        {% if error %}
        <div x-data x-init="window.dispatchEvent(new CustomEvent('show-toast', { detail: { message: '{{ error }}', type: 'error' } }))"></div>
        {% endif %}
        {% if success %}
        <div x-data x-init="window.dispatchEvent(new CustomEvent('show-toast', { detail: { message: '{{ success }}', type: 'success' } }))"></div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <!-- Toast notification system -->
    <div class="toast-container" x-data="toastSystem()" @show-toast.window="addToast($event.detail)">
        <template x-for="toast in toasts" :key="toast.id">
            <div class="toast" 
                 :class="toast.type === 'error' ? 'toast-error' : 'toast-success'" 
                 x-show="toast.visible"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0"
                 x-transition:leave-end="opacity-0 translate-y-2"
                 x-text="toast.message">
            </div>
        </template>
    </div>

    <script>
    function toastSystem() {
        return {
            toasts: [],
            addToast(detail) {
                const id = Date.now();
                const message = detail.message || detail;
                const type = detail.type || 'success';
                this.toasts.push({ id, message, type, visible: false });
                
                // Wait next tick to show transition
                this.$nextTick(() => {
                    const toast = this.toasts.find(t => t.id === id);
                    if (toast) toast.visible = true;
                });
                
                // Auto dismiss
                setTimeout(() => {
                    const toast = this.toasts.find(t => t.id === id);
                    if (toast) {
                        toast.visible = false;
                        // Remove from array after transition finishes
                        setTimeout(() => {
                            this.toasts = this.toasts.filter(t => t.id !== id);
                        }, 300);
                    }
                }, 4000);
            }
        }
    }

    // Intercept HTMX requests to check for toast notifications
    document.addEventListener('htmx:afterRequest', function(evt) {
        const xhr = evt.detail.xhr;
        const triggerHeader = xhr.getResponseHeader('HX-Trigger');
        if (triggerHeader) {
            try {
                const triggers = JSON.parse(triggerHeader);
                if (triggers.showToast) {
                    window.dispatchEvent(new CustomEvent('show-toast', { detail: triggers.showToast }));
                }
            } catch(e) {}
        }
    });
    </script>
</body>
</html>
