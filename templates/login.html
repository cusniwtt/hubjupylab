{% extends "base.html" %}

{% block title %}Login - HubJupyLab{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="card login-card">
        <h2>Welcome to HubJupyLab</h2>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Login</button>
        </form>
    </div>
</div>
{% endblock %}
